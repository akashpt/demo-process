<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texa | Cone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

 
 
  </head>
  <body>
    <div id="loaderDots" class="dots-loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <aside>
      <div class="logo-area">
        <div class="logo_div">
          <a href="index.html"><img src="img/logo.png" alt="Logo" /></a>
        </div>
      </div>
      <div class="menu-section">
        <div class="menu-label">Navigation</div>
        <a href="index.html"
          ><div class="menu-item active">
            <i class="fa-solid fa-house"></i> HOME
          </div></a
        >
        <!-- <div class="menu-item">
          <i class="fa-solid fa-chart-simple"></i> REPORT
        </div>
        <div class="menu-item">
          <i class="fa-solid fa-sliders"></i> CONTROLLER
        </div> -->
        <a href="traning.html"
          ><div class="menu-item">
            <i class="fa-solid fa-microchip"></i> TRAINING
          </div></a
        >
        <!-- <div class="menu-label" style="margin-top: 4px">System</div>
        <div class="menu-item"><i class="fa-solid fa-gear"></i> SETTINGS</div> -->
      </div>
      <div class="sidebar-footer">
        <div class="signal-block">
          <div class="signal-label">Cone Count</div>
          <div class="signal-value">
            <span class="signal-dot"></span><span id="signalCount">244</span>
          </div>
        </div>
      </div>
    </aside>

    <main>
      <header>
        <div class="header-left">
          <span class="breadcrumb">Cone Inspection</span>
          <span class="header-badge">YARN INSPECTION</span>
        </div>
        <div id="statusPill" class="status-pill waiting">
          <span class="status-dot"></span>
          <span id="statusText">WAITING</span>
        </div>
        <div class="header-right">
          <span id="liveTime">--/--/---- — --:--:--</span>
          <div class="header-user">
            <i
              class="fa-solid fa-user"
              style="opacity: 0.8; font-size: 0.68rem"
            ></i>
          </div>
        </div>
      </header>

      <div class="content">
        <div class="camera-wrap">
          <div class="camera-area">
            <video id="video" autoplay playsinline muted></video>
            <div id="placeholder" class="camera-placeholder">
              <div class="cam-ring"><i class="fa-solid fa-camera"></i></div>
              <div class="cam-hint">
                Press the green <strong>START</strong>
                <span style="display: flex">button to begin inspection</span>
              </div>
            </div>
            <div id="camOverlay" class="cam-overlay">
              <div class="scan-line"></div>
              <div class="corner-tl"></div>
              <div class="corner-tr"></div>
              <div class="corner-bl"></div>
              <div class="corner-br"></div>
              <div class="cam-footer">
                <span class="cam-tag" id="camTag">—</span>
                <div class="live-badge"><span class="live-dot"></span>LIVE</div>
              </div>
            </div>
          </div>
        </div>

        <div class="controls-sidebar">
          <div class="panel-sec">
            <div class="sec-lbl">Controls</div>
            <div class="btn-row">
              <button id="btnStart" class="btn-main btn-start">
                <span class="btn-icon"
                  ><i class="fa-solid fa-circle-play"></i
                ></span>
                <span class="btn-label">START</span>
              </button>
              <button id="btnStop" class="btn-main btn-stop">
                <span class="btn-icon"
                  ><i class="fa-solid fa-circle-stop"></i
                ></span>
                <span class="btn-label">STOP</span>
              </button>
              <button id="btnCapture" class="btn-main btn-capture">
                <span class="btn-icon"><i class="fa-solid fa-camera"></i></span>
                <span class="btn-label">Capture</span>
              </button>
            </div>
          </div>

          <!-- ← NEW DROPDOWN SECTION added here -->
          <div class="panel-sec">
            <div class="sec-lbl">Choose Camera</div>
            <div class="select-wrapper">
              <select id="inspectionMode">
                <option value="auto">Sliver</option>
                <option value="manual">Cone</option>
                <option value="yarn">Yarn</option>
              </select>
              <i class="fa-solid fa-chevron-down select-arrow"></i>
            </div>
          </div>

          <!-- Recent Captures -->
          <div class="image-slider-wrap">
            <div class="sec-lbl">Recent Captures</div>
            <div class="slider-container">
              <div class="slider-track" id="sliderTrack">
                <img
                  src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800"
                  alt="Yarn 1"
                />
                <img
                  src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800"
                  alt="Yarn 2"
                />
                <img
                  src="https://images.unsplash.com/photo-1617791160505-6f00504e3519?w=800"
                  alt="Yarn 3"
                />
                <img
                  src="https://images.unsplash.com/photo-1606857521015-7f9fcf423740?w=800"
                  alt="Yarn 4"
                />
                <img
                  src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800"
                  alt="Yarn 5"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Modal -->
        <div id="imageModal" class="modal">
          <span class="modal-close"><i class="fa-solid fa-x"></i></span>
          <div class="modal-content">
            <img id="modalImage" src="" alt="Enlarged yarn image" />
          </div>
          <button class="modal-nav modal-prev">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="modal-nav modal-next">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </main>

    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg">Done.</span>
    </div>

    <script>
      const pad = (n) => String(n).padStart(2, "0");

      function updateTime() {
        const n = new Date();
        document.getElementById("liveTime").textContent =
          `${pad(n.getDate())}/${pad(n.getMonth() + 1)}/${n.getFullYear()} — ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
      }
      setInterval(updateTime, 1000);
      updateTime();

      const btnStart = document.getElementById("btnStart");
      const btnCapture = document.getElementById("btnCapture");
      const btnStop = document.getElementById("btnStop");
      const statusPill = document.getElementById("statusPill");
      const statusText = document.getElementById("statusText");
      const video = document.getElementById("video");
      const placeholder = document.getElementById("placeholder");
      const camOverlay = document.getElementById("camOverlay");
      const camTag = document.getElementById("camTag");

      let stream = null;

      async function startCam() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
          await video.play();
          placeholder.classList.add("hidden");
          camOverlay.classList.add("visible");
        } catch (err) {
          alert("Camera access failed.\n" + err.name + " – " + err.message);
        }
      }

      function stopCam() {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        video.srcObject = null;
        placeholder.classList.remove("hidden");
        camOverlay.classList.remove("visible");
      }

      btnStart.onclick = () => {
        btnStart.disabled = true;
        btnStop.disabled = false;
        statusPill.className = "status-pill running";
        statusText.textContent = "RUNNING";
        camTag.textContent = "Inspection in progress";
        startCam();
      };

      btnCapture.onclick = () => {
        // Simple placeholder - you can improve this later
        alert("Capture functionality not fully implemented yet.");
      };

      btnStop.onclick = () => {
        btnStop.disabled = true;
        btnStart.disabled = false;
        btnCapture.disabled = false;
        statusPill.className = "status-pill waiting";
        statusText.textContent = "WAITING";
        stopCam();
        camTag.textContent = "—";
      };

      // ── Modal logic ──────────────────────────────────────────────
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");
      const closeBtn = document.querySelector(".modal-close");
      const prevBtn = document.querySelector(".modal-prev");
      const nextBtn = document.querySelector(".modal-next");

      let currentImages = [];
      let currentIndex = 0;

      function openModal(index) {
        currentImages = Array.from(
          document.querySelectorAll("#sliderTrack img"),
        );
        currentIndex = index;
        showImage();
        modal.classList.add("show");
      }

      function showImage() {
        if (!currentImages.length) return;
        const img = currentImages[currentIndex];
        modalImg.src = img.src;
        modalImg.alt = img.alt;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === currentImages.length - 1;
      }

      function closeModal() {
        modal.classList.remove("show");
        setTimeout(() => {
          modalImg.src = "";
        }, 300);
      }

      document.querySelectorAll("#sliderTrack img").forEach((img, i) => {
        img.addEventListener("click", () => openModal(i));
      });

      closeBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          showImage();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentIndex < currentImages.length - 1) {
          currentIndex++;
          showImage();
        }
      });

      window.addEventListener("keydown", (e) => {
        if (!modal.classList.contains("show")) return;
        if (e.key === "ArrowLeft") prevBtn.click();
        if (e.key === "ArrowRight") nextBtn.click();
        if (e.key === "Escape") closeModal();
      });

      // Hide loader
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("loaderDots").style.display = "none";
        }, 1400);
      });
    </script>
  </body>
</html>
